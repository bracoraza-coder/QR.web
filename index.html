<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador QR Pro | CrearunQR.com</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Librería ESENCIAL: Si esto falta, nada funciona -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body>

    <!-- Botón Modo Oscuro -->
    <button id="theme-toggle" class="theme-btn">🌙</button>

    <main class="container">
        <!-- COLUMNA IZQUIERDA -->
        <section class="left">
            <div class="header-titles">
                <h1>Generador QR Pro</h1>
                <p class="subtitle">Crea códigos dinámicos, personalizados y con logo.</p>
            </div>

            <!-- Pestañas -->
            <div class="tabs">
                <button class="tab active" data-target="tab-url">Enlace</button>
                <button class="tab" data-target="tab-text">Texto</button>
                <button class="tab" data-target="tab-email">Email</button>
                <button class="tab" data-target="tab-wa">WhatsApp</button>
                <button class="tab" data-target="tab-wifi">Wi-Fi</button>
            </div>

            <!-- Formularios -->
            <div class="tab-content active" id="tab-url">
                <div class="input-group">
                    <label>Introduce la URL</label>
                    <input type="url" id="input-url" placeholder="https://tu-web.com">
                </div>
            </div>

            <div class="tab-content" id="tab-text">
                <div class="input-group">
                    <label>Tu Texto</label>
                    <textarea id="input-text" rows="3" placeholder="Escribe tu mensaje..."></textarea>
                </div>
            </div>

            <div class="tab-content" id="tab-email">
                <div class="input-group">
                    <label>Email de destino</label>
                    <input type="email" id="input-email-to" placeholder="contacto@ejemplo.com">
                </div>
                <div class="input-group">
                    <label>Asunto</label>
                    <input type="text" id="input-email-sub" placeholder="Asunto del correo">
                </div>
            </div>

            <div class="tab-content" id="tab-wa">
                <div class="input-group">
                    <label>Número (con prefijo, ej: 34)</label>
                    <input type="number" id="input-wa-phone" placeholder="34600000000">
                </div>
                <div class="input-group">
                    <label>Mensaje</label>
                    <input type="text" id="input-wa-msg" placeholder="Hola...">
                </div>
            </div>

            <div class="tab-content" id="tab-wifi">
                <div class="row">
                    <div class="input-group">
                        <label>Red (SSID)</label>
                        <input type="text" id="input-wifi-ssid" placeholder="Mi_WiFi">
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="text" id="input-wifi-pass" placeholder="********">
                    </div>
                </div>
                <div class="input-group">
                    <label>Seguridad</label>
                    <select id="input-wifi-type">
                        <option value="WPA">WPA/WPA2</option>
                        <option value="WEP">WEP</option>
                        <option value="nopass">Sin contraseña</option>
                    </select>
                </div>
            </div>

            <hr class="divider">

            <!-- Diseño -->
            <h3 class="section-title">🎨 Diseño</h3>
            <div class="row">
                <div class="input-group">
                    <label>Color QR</label>
                    <input type="color" id="color-dark" value="#1e293b">
                </div>
                <div class="input-group">
                    <label>Fondo</label>
                    <input type="color" id="color-light" value="#ffffff">
                </div>
            </div>

            <div class="input-group">
                <label>Forma</label>
                <select id="dot-style">
                    <option value="square">Cuadrados</option>
                    <option value="dots">Puntos</option>
                    <option value="rounded">Redondeados</option>
                    <option value="extra-rounded">Extra Redondos</option>
                </select>
            </div>

            <hr class="divider">

            <!-- Logo -->
            <div class="input-group">
                <label>Logo (Opcional)</label>
                <input type="file" id="logo-input" accept="image/*">
                <button id="btn-remove-logo" class="btn-text" style="display:none;">Quitar Logo</button>
            </div>

            <button id="btn-generate" class="btn-primary">Generar QR</button>

            <!-- NUEVA SECCIÓN DE HISTORIAL (CRÍTICA) -->
            <div id="history-container" class="history-section" style="display: none;">
                <h3 class="section-title">🕒 Historial Reciente</h3>
                <ul id="history-list"></ul>
            </div>
        </section>

        <!-- COLUMNA DERECHA -->
        <section class="right">
            <div id="qr-wrapper">
                <div id="qr"></div>
            </div>
            <div class="download-actions">
                <button id="btn-copy-link" class="btn-secondary hidden">Copiar</button>
                <button id="btn-down-png" class="btn-secondary" disabled>PNG</button>
                <button id="btn-down-svg" class="btn-secondary" disabled>SVG</button>
            </div>
        </section>
    </main>

    <!-- Cargamos tu script AL FINAL -->
    <script src="script.js"></script>
</body>
</html>
